<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REY MARKET</title>
    <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="{{ url_for('Pagina_Principal') }}">Inicio</a></li>
                <li><a href="{{ url_for('ofertas')}}">Ofertas</a></li>
                <li><a href="{{ url_for('contacto') }}">Contacto</a></li>
                <li><a href="{{ url_for('login') }}">Login</a></li>
                <li><a href="{{ url_for('registro') }}">Registro</a></li>
                <li style="position:relative;">
                <a href="{{ url_for('carrito') }}" id="carrito-icon" style="font-size:1.5rem; position:relative; display:inline-block;">🛒
                <span id="carrito-badge" class="carrito-badge {{ 'badge-visible' if total_items_carrito > 0 else 'badge-oculto' }}">
                {{ total_items_carrito }}
                </span>
                </a>
                </li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="categorias">
            <button class="categoria-btn activo" onclick="filtrarCategoria(this, 'todos')">Todos</button>
            <button class="categoria-btn" onclick="filtrarCategoria(this, 'verduras')">Verduras</button>
            <button class="categoria-btn" onclick="filtrarCategoria(this, 'refrescos')">Refrescos</button>
            <button class="categoria-btn" onclick="filtrarCategoria(this, 'lacteos')">Lácteos</button>
            <button class="categoria-btn" onclick="filtrarCategoria(this, 'panaderia')">Panadería</button>
            <button class="categoria-btn" onclick="filtrarCategoria(this, 'pasta')">Pasta</button>
            <button class="categoria-btn" onclick="filtrarCategoria(this, 'fruta')">Fruta</button>
            <button class="categoria-btn" onclick="filtrarCategoria(this, 'carne')">Carne</button>
            <button class="categoria-btn" onclick="filtrarCategoria(this, 'conservas')">Conservas</button>
        </div>

        <div class="Productos">
            {% for producto in productos %}
                <div class="producto" data-categoria="{{producto.categoria}}">
                    <img src="{{ url_for('static', filename='imagenes/' + producto.url_imagen) }}" alt="{{producto.nombre}}">
                    <h3>{{producto.nombre}}</h3>
                    <p>Precio: {{producto.precio_unidad}}€/{{producto.unidad_medida}}</p>
                    <button onclick="AgregaralCarrito(this, '{{producto.nombre}}', '{{producto.precio_unidad}}')">Añadir al carrito</button>
                </div>
            {% endfor %}
        </div>
    </main>

    <div id="toast"></div>

    <script>
        function filtrarCategoria(btn, categoria) {
            document.querySelectorAll('.categoria-btn').forEach(b => b.classList.remove('activo'));
            btn.classList.add('activo');
            document.querySelectorAll('.producto').forEach(prod => {
                prod.style.display = (categoria === 'todos' || prod.dataset.categoria === categoria) ? '' : 'none';
            });
        }

        function AgregaralCarrito(btn, nombre, precio) {
            // Animación botón
            btn.textContent = '✓ Añadido';
            btn.disabled = true;
            btn.style.background = '#1b5e20';
            setTimeout(() => {
                btn.textContent = 'Añadir al carrito';
                btn.style.background = '';
                btn.disabled = false;
            }, 1500);

            // Burbuja voladora
            const carritoIcon = document.getElementById('carrito-icon');
            const btnRect = btn.getBoundingClientRect();
            const carritoRect = carritoIcon.getBoundingClientRect();

            const burbuja = document.createElement('div');
            burbuja.className = 'burbuja-fly';
            burbuja.textContent = '🛒';
            burbuja.style.left = (btnRect.left + btnRect.width / 2) + 'px';
            burbuja.style.top = (btnRect.top + window.scrollY) + 'px';
            burbuja.style.setProperty('--dx', (carritoRect.left - btnRect.left) + 'px');
            burbuja.style.setProperty('--dy', (carritoRect.top - btnRect.top - window.scrollY) + 'px');
            document.body.appendChild(burbuja);

            // Forzar reflow para que la animación arranque
            burbuja.offsetWidth;
            burbuja.classList.add('volando');

            burbuja.addEventListener('animationend', () => {
                burbuja.remove();
                carritoIcon.classList.add('shake');
                setTimeout(() => carritoIcon.classList.remove('shake'), 500);
            });

            // Petición al servidor
            fetch('/carrito/agregar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nombre, precio })
            })
            .then(r => r.json())
            .then(data => {
                const badge = document.getElementById('carrito-badge');
                badge.textContent = data.total_items;
                badge.style.display = data.total_items > 0 ? 'flex' : 'none';
            });
        }
    </script>
</body>
</html>
